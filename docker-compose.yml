services:
  # Banco de dados PostgreSQL
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: forca
      POSTGRES_PASSWORD: forca
      POSTGRES_DB: forca
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forca -d forca"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Servidor Redis necessário para a fila e sistema distribuído
  redis:
    image: redis:alpine
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend Node.js
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://forca:forca@db:5432/forca
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: on-failure

  # Frontend React/Vite
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      # VITE_API_URL usa localhost pois é consumido pelo navegador do usuário
      - VITE_API_URL=http://localhost:3001
    volumes:
      # Mapeia as pastas locais para refletir edição em tempo real no container
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
